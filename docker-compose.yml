version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: dafa-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dafa_sales
      POSTGRES_USER: dafa_user
      POSTGRES_PASSWORD: dafa_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dafa_user -d dafa_sales"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
